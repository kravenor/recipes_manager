services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ricette-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ricette}
      MYSQL_USER: ${MYSQL_USER:-ricette}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ricette}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ricette-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Elasticsearch
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: ricette-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - ricette-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Kibana (optional, for ES management)
  kibana:
    image: kibana:8.11.0
    container_name: ricette-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    networks:
      - ricette-network
    depends_on:
      elasticsearch:
        condition: service_healthy

  # Backend Laravel
  backend:
    build:
      context: ./backend/docker
      dockerfile: Dockerfile
    container_name: ricette-backend
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    networks:
      - ricette-network
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${MYSQL_DATABASE:-ricette}
      - DB_USERNAME=${MYSQL_USER:-ricette}
      - DB_PASSWORD=${MYSQL_PASSWORD:-ricette}
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200

  # Nginx for Backend
  nginx:
    image: nginx:alpine
    container_name: ricette-nginx
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ricette-network
    depends_on:
      - backend

  # Frontend Vue
  frontend:
    image: node:20-alpine
    container_name: ricette-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    command: ["sh", "-c", "npm install && npm run dev -- --host"]
    networks:
      - ricette-network
    environment:
      - VITE_API_URL=http://localhost:${BACKEND_PORT:-8000}/api

networks:
  ricette-network:
    driver: bridge

volumes:
  mysql_data:
  es_data: